<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curve Asset Management | Institutional Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Color System - Midnight Premium */
            --bg-deep: #05070a;
            --bg-surface: #0f1218;
            --bg-card: rgba(22, 27, 36, 0.7);
            --border-primary: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.15);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            
            --accent-primary: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --accent-gradient: linear-gradient(135deg, #3b82f6, #2563eb);
            
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.2);
            --danger: #ef4444;
            --danger-glow: rgba(239, 68, 68, 0.2);
            --warning: #f59e0b;
            
            --sidebar-width: 280px;
            --header-height: 80px;
            
            --glass-bg: rgba(15, 18, 24, 0.8);
            --glass-blur: blur(12px);
        }

        [data-theme="light"] {
            --bg-deep: #f8fafc;
            --bg-surface: #ffffff;
            --bg-card: #ffffff;
            --border-primary: #e2e8f0;
            --border-hover: #cbd5e1;
            
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-tertiary: #94a3b8;
            
            --accent-primary: #2563eb;
            --accent-glow: rgba(37, 99, 235, 0.1);
            
            --glass-bg: rgba(255, 255, 255, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, h4 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        /* --- Transitions & Effects --- */
        @keyframes tickerScroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .ticker-wrap {
            width: 100%;
            overflow: hidden;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border-primary);
            padding: 12px 0;
            margin: -40px -40px 40px -40px;
            width: calc(100% + 80px);
        }

        .ticker-move {
            display: flex;
            width: max-content;
            animation: tickerScroll 40s linear infinite;
        }

        .ticker-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 40px;
            border-right: 1px solid var(--border-primary);
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-primary);
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            border: 1px solid transparent;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-primary);
            border-color: var(--border-primary);
        }

        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-hover);
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            background: rgba(22, 27, 36, 0.9);
        }

        /* --- Public Landing Page Styles --- */
        .public-page {
            width: 100%;
            min-height: 100vh;
        }

        .landing-nav {
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 80px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 700;
            color: white;
            font-family: 'Outfit';
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(-10deg);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .ticker-val {
            font-size: 22px;
            font-weight: 700;
            margin: 4px 0;
            font-family: 'Outfit';
        }

        .sparkline {
            width: 100%;
            height: 40px;
            margin-top: 12px;
            stroke-width: 2;
            fill: none;
            stroke: var(--accent-primary);
        }

        .hero-section {
            padding: 200px 80px 120px;
            text-align: center;
            background: radial-gradient(circle at top center, rgba(59, 130, 246, 0.15), transparent 50%);
        }

        .hero-badge {
            display: inline-flex;
            padding: 6px 16px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 100px;
            color: var(--accent-primary);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .hero-title {
            font-size: 72px;
            line-height: 1.1;
            margin-bottom: 24px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .hero-subtitle {
            font-size: 20px;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 40px;
        }

        .landing-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
            padding: 80px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* --- Auth Flow Styles --- */
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: linear-gradient(135deg, var(--bg-deep) 0%, #0a0f1a 100%);
        }

        .auth-card {
            width: 100%;
            max-width: 450px;
            padding: 48px;
            border-radius: 24px;
            background: var(--bg-surface);
            border: 1px solid var(--border-primary);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .form-input {
            width: 100%;
            background: #161b24;
            border: 1px solid var(--border-primary);
            padding: 14px 18px;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px var(--accent-glow);
        }

        /* --- App Shell Styles --- */
        .app-shell {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-surface);
            border-right: 1px solid var(--border-primary);
            padding: 32px 16px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .nav-list {
            list-style: none;
            margin-top: 40px;
            flex: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 8px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .nav-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-link.active {
            color: white;
            background: var(--accent-gradient);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .symbol-badge {
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            color: var(--text-secondary);
        }

        .nav-icon {
        }

        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 40px;
            max-width: 1600px;
        }

        /* --- Dashboard Module Styles --- */
        .market-hero {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }

        .ticker-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--border-primary);
        }

        .ticker-symbol {
            font-size: 12px;
            color: var(--text-tertiary);
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .ticker-val {
            font-size: 28px;
            font-weight: 700;
            margin: 8px 0;
            font-family: 'Outfit';
        }

        .ticker-change {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .up { color: var(--success); }
        .down { color: var(--danger); }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 32px;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* --- Intelligence Hub Styles --- */
        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .report-card {
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }

        .report-card.locked::after {
            content: "LOCKED";
            position: absolute;
            top: 20px;
            right: -30px;
            background: var(--danger);
            color: white;
            padding: 4px 40px;
            font-size: 10px;
            font-weight: 800;
            transform: rotate(45deg);
        }

        .report-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        /* --- Table Styling --- */
        .table-wrap {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 16px;
            color: var(--text-tertiary);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-primary);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--border-primary);
        }

        /* --- Notification Styles --- */
        .noti-btn {
            position: relative;
        }

        .noti-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            background: var(--danger);
            border-radius: 50%;
            border: 2px solid var(--bg-surface);
        }

        /* --- Onboarding Styles --- */
        .onboarding-wrap {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 40px;
        }

        .step-dot {
            width: 40px;
            height: 4px;
            background: var(--border-primary);
            border-radius: 2px;
        }

        .step-dot.active {
            background: var(--accent-primary);
        }

        .interest-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-top: 32px;
        }

        .interest-chip {
            padding: 16px;
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .interest-chip.selected {
            background: var(--accent-glow);
            border-color: var(--accent-primary);
        }

        /* --- Animations --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate {
            animation: fadeIn 0.5s ease forwards;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .landing-nav { padding: 0 40px; }
            .hero-title { font-size: 48px; }
            .landing-grid { grid-template-columns: 1fr 1fr; padding: 40px; }
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <div id="app-root"></div>

    <script>
        // --- State Management ---
        const state = {
            currentScreen: 'landing',
            user: null, // null if not logged in
            theme: 'dark',
            notifications: [
                { id: 1, title: 'New Auto Sector Report', body: 'Global Summary Auto Report has been published.', type: 'report', timestamp: '2h ago', read: false },
                { id: 2, title: 'Dividend Alert', body: 'Toyota (TM) announced Q4 dividend.', type: 'payout', timestamp: '5h ago', read: true }
            ],
            interests: {
                sectors: [],
                companies: []
            },
            // Shared simulated data from Admin context
            selectedSector: 'All Sectors',
            reports: [
                { id: 'R-2025-001', name: 'Global Summary Auto Report', sector: 'Global Autos', date: '2025-04-28', status: 'published', type: 'PDF', entitlement: 'Pro' },
                { id: 'R-2025-002', name: 'Semiconductor Outlook Q2', sector: 'Technology', date: '2025-04-27', status: 'published', type: 'PDF', entitlement: 'Elite' },
                { id: 'R-2025-003', name: 'Retail Bank Credit Audit', sector: 'Financial Services', date: '2025-04-26', status: 'published', type: 'PDF', entitlement: 'Starter' }
            ],
            stocks: [
                { ticker: 'TM', name: 'Toyota Motor', price: 194.22, change: +1.45, sector: 'Global Autos' },
                { ticker: 'AAPL', name: 'Apple Inc', price: 182.50, change: -0.85, sector: 'Technology' },
                { ticker: 'NVDA', name: 'Nvidia Corp', price: 850.12, change: +3.20, sector: 'Technology' },
                { ticker: 'JPM', name: 'JPMorgan Chase', price: 198.40, change: +0.40, sector: 'Financial Services' }
            ],
            plans: [
                { id: 'P1', name: 'Starter', price: 0, features: ['Limited Sectors', 'Daily Summaries'] },
                { id: 'P2', name: 'Pro', price: 49, features: ['Unlimited Sectors', 'Deep Dive Reports', 'Payout Alerts'] },
                { id: 'P3', name: 'Elite', price: 199, features: ['Institutional Terminal', 'Analyst Access', 'API Data'] }
            ]
        };

        // --- Core Functions ---
        function navigate(screen) {
            state.currentScreen = screen;
            render();
            window.scrollTo(0, 0);
        }

        function render() {
            const root = document.getElementById('app-root');
            root.innerHTML = '';

            if (state.currentScreen === 'landing') renderLanding(root);
            else if (state.currentScreen === 'login') renderAuth(root, 'login');
            else if (state.currentScreen === 'signup') renderAuth(root, 'signup');
            else if (state.currentScreen === 'onboarding') renderOnboarding(root);
            else {
                // Main App Layout
                const shell = document.createElement('div');
                shell.className = 'app-shell';
                
                shell.innerHTML = `
                    <aside class="sidebar">
                        <div class="logo-wrap" onclick="navigate('dashboard')" style="cursor:pointer; margin-bottom: 40px; padding: 0 16px;">
                            <div class="logo-icon">C</div>
                            <span>Curve Asset Management</span>
                        </div>
                        <nav class="nav-list">
                            <a href="#" class="nav-link ${state.currentScreen === 'dashboard' ? 'active' : ''}" onclick="navigate('dashboard')">Home</a>
                            <a href="#" class="nav-link ${state.currentScreen === 'reports' ? 'active' : ''}" onclick="navigate('reports')">Intelligence Hub</a>
                            <a href="#" class="nav-link ${state.currentScreen === 'subscription' ? 'active' : ''}" onclick="navigate('subscription')">Subscription</a>
                        </nav>
                        <div class="sidebar-footer" style="padding: 16px;">
                            <div class="nav-link" onclick="handleLogout()" style="cursor:pointer; color: var(--danger);">Logout</div>
                        </div>
                    </aside>
                    <main class="main-content">
                        <header style="display:flex; justify-content:space-between; align-items:center; margin-bottom:40px;">
                            <h2 id="page-title" style="font-size:24px;">Dashboard</h2>
                            <div style="display:flex; gap:16px; align-items:center;">
                                <button class="btn btn-ghost" onclick="toggleTheme()" style="padding: 8px; border-radius: 50%; width: 40px; height: 40px; justify-content: center;">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-toggle-icon">
                                        <circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                                    </svg>
                                </button>
                                <div class="noti-btn" onclick="navigate('notifications')" style="cursor:pointer;">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                                    <span class="noti-badge"></span>
                                </div>
                                <div class="avatar" style="width:40px; height:40px; cursor:pointer;" onclick="navigate('profile')">MA</div>
                            </div>
                        </header>
                        <div id="content-area"></div>
                    </main>
                `;
                root.appendChild(shell);
                
                const contentArea = document.getElementById('content-area');
                if (state.currentScreen === 'dashboard') renderDashboard(contentArea);
                else if (state.currentScreen === 'stocks') renderStocks(contentArea);
                else if (state.currentScreen === 'funds') renderMutualFunds(contentArea);
                else if (state.currentScreen === 'reports') renderIntelligenceHub(contentArea);
                else if (state.currentScreen === 'subscription') renderSubscription(contentArea);
                else if (state.currentScreen === 'report_viewer') renderReportViewer(contentArea);
                else if (state.currentScreen === 'notifications') renderNotifications(contentArea);
                else {
                    contentArea.innerHTML = `<div class="card"><h3>Module Implementation in Progress...</h3><p>We are building the ${state.currentScreen} module with institutional-grade logic.</p></div>`;
                }
            }
        }

        // --- View Renders ---

        function renderLanding(container) {
            container.innerHTML = `
                <div class="public-page animate">
                    <nav class="landing-nav glass">
                        <div class="logo-wrap">
                            <div class="logo-icon">C</div>
                            <span>Curve Asset Management</span>
                        </div>
                        <div style="display:flex; gap:24px;">
                            <button class="btn btn-ghost" onclick="navigate('login')">Login</button>
                            <button class="btn btn-primary" onclick="navigate('signup')">Get Started</button>
                        </div>
                    </nav>
                    
                    <section class="hero-section">
                        <div class="hero-badge">Institutional Grade Research for Retail Investors</div>
                        <h1 class="hero-title">Decode the Market with <span style="color:var(--accent-primary)">Expert Precision.</span></h1>
                        <p class="hero-subtitle">Access professional financial intelligence, deep-dive sector reports, and automated signals curated by elite analysts.</p>
                        <div style="display:flex; justify-content:center; gap:16px;">
                            <button class="btn btn-primary" style="padding:14px 32px;" onclick="navigate('signup')">Start Free Trial</button>
                            <button class="btn btn-ghost" style="padding:14px 32px;">Explore Market Data</button>
                        </div>
                    </section>

                    <div class="landing-grid">
                        <div class="card">
                            <h3>Smart Signals</h3>
                            <p style="color:var(--text-secondary); margin-top:12px;">Automated long/short indicators derived from balance sheet pressure and cash flow audits.</p>
                        </div>
                        <div class="card">
                            <h3>Sector Hubs</h3>
                            <p style="color:var(--text-secondary); margin-top:12px;">Deep vertical intelligence covering Autos, Tech, and Financials with proprietary benchmarks.</p>
                        </div>
                        <div class="card">
                            <h3>Payout Engine</h3>
                            <p style="color:var(--text-secondary); margin-top:12px;">Never miss a dividend or corporate action with our high-fidelity institutional calendar.</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderAuth(container, type) {
            container.innerHTML = `
                <div class="auth-container">
                    <div class="auth-card animate">
                        <div class="logo-wrap" style="justify-content:center; margin-bottom:32px;">
                            <div class="logo-icon">C</div>
                            <span>Curve Asset Management</span>
                        </div>
                        <h2 style="text-align:center; margin-bottom:8px;">${type === 'login' ? 'Welcome Back' : 'Create Account'}</h2>
                        <p style="text-align:center; color:var(--text-secondary); margin-bottom:32px;">${type === 'login' ? 'Enter your details to access your terminal.' : 'Start your journey into institutional intelligence.'}</p>
                        
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-input" placeholder="name@company.com">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-input" placeholder="••••••••">
                        </div>
                        
                        ${type === 'login' ? `
                            <div style="display:flex; justify-content:space-between; margin-bottom:24px; font-size:13px;">

        function isEntitled(report) {
            if (!state.user) return false;
            const planWeights = { 'Starter': 1, 'Pro': 2, 'Elite': 3 };
            const userWeight = planWeights[state.plans.find(p => p.id === state.user.planId).name] || 1;
            const reportWeight = planWeights[report.entitlement] || 1;
            return userWeight >= reportWeight;
        }

        function openReport(id) {
            const r = state.reports.find(x => x.id === id);
            if (!isEntitled(r)) {
                alert('This report is locked. Please upgrade to the ' + r.entitlement + ' plan to unlock institutional research.');
                navigate('subscription');
                return;
            }
            state.activeReportId = id;
            navigate('report_viewer');
        }

        function markAllRead() {
            state.notifications.forEach(n => n.read = true);
            render();
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            state.theme = newTheme;
            
            const icon = document.getElementById('theme-toggle-icon');
            if (newTheme === 'light') {
                icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>';
