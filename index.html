<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curve Asset Management | Institutional Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* Color System - Light Mode */
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            --border-color: #e2e8f0;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-tertiary: #94a3b8;
            --accent-primary: #2563eb;
            --accent-secondary: #3b82f6;

            /* Semantic Colors */
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #0ea5e9;

            /* Long/Short Indicators */
            --color-long: #059669;
            --color-short: #dc2626;

            /* Sidebar */
            --sidebar-width: 260px;
            --sidebar-bg: #0f172a;
            --sidebar-text: #f8fafc;
            --sidebar-active: #334155;

            /* Shadows */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        [data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --border-color: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-tertiary: #64748b;
            --accent-primary: #3b82f6;
            --accent-secondary: #60a5fa;

            --sidebar-bg: #020617;
            --sidebar-active: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.5;
            overflow: hidden;
            height: 100vh;
        }

        /* Layout Structure */
        #app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar */
        aside {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 50;
        }

        .sidebar-header {
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 18px;
        }

            <span class="brand-name">Curve Asset</span>

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
        }

        .nav-group {
            margin-bottom: 24px;
        }

        .nav-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-tertiary);
            padding: 0 12px 8px;
            opacity: 0.7;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            border-radius: 6px;
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .nav-item.active {
            background-color: var(--sidebar-active);
            color: white;
            font-weight: 500;
        }

        .nav-icon {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .sidebar-footer {
            padding: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
        }

        .avatar {
            width: 32px;
            height: 32px;
            background-color: var(--accent-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
            color: white;
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 500;
            font-size: 13px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-role {
            font-size: 11px;
            color: var(--text-tertiary);
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        header {
            height: 64px;
            background-color: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 40;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
            flex: 1;
        }

        .search-container {
            position: relative;
            max-width: 400px;
            width: 100%;
        }

        .search-container svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
        }

        .search-input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            color: var(--text-primary);
        }

        .search-input:focus {
            border-color: var(--accent-primary);
            background-color: var(--bg-primary);
        }

        .command-hint {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            padding: 2px 6px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 10px;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-tertiary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
            border: none;
            background: transparent;
        }

        .icon-btn:hover {
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .badge-container {
            position: relative;
        }

        .badge {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 8px;
            height: 8px;
            background-color: var(--danger);
            border: 2px solid var(--bg-primary);
            border-radius: 50%;
        }

        /* Content Area */
        .content-scroller {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .page-header {
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .page-title h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .page-title p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 4px;
        }

        .page-actions {
            display: flex;
            gap: 12px;
        }

        /* UI Components */
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .btn-primary {
            background-color: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--accent-secondary);
            border-color: var(--accent-secondary);
        }

        .btn-ghost:hover {
            background-color: var(--bg-tertiary);
        }

        /* Stats & Widgets */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background-color: var(--bg-primary);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -0.02em;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }

        /* Tables */
        .card {
            background-color: var(--bg-primary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            margin-bottom: 24px;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-title {
            font-weight: 600;
            font-size: 15px;
        }

        .table-container {
            width: 100%;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background-color: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        th {
            padding: 12px 20px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
            color: var(--text-tertiary);
        }

        td {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-primary);
        }

        tr:hover {
            background-color: var(--bg-secondary);
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .status-pill {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .status-success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .status-warning {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .status-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .status-info {
            background: rgba(14, 165, 233, 0.1);
            color: var(--info);
        }

        .signal-long {
            color: var(--color-long);
            font-weight: 600;
        }

        .signal-short {
            color: var(--color-short);
            font-weight: 600;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
        }

        /* Split Screen Review */
        .split-layout {
            display: flex;
            gap: 20px;
            height: calc(100vh - 200px);
        }

        .split-pane {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Drawer */
        .drawer-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            display: none;
        }

        .drawer {
            position: fixed;
            top: 0;
            right: -600px;
            width: 600px;
            height: 100%;
            background: var(--bg-primary);
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.1);
            z-index: 101;
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .drawer.open {
            right: 0;
        }

        .drawer-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .drawer-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        .drawer-footer {
            padding: 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .review-field {
            margin-bottom: 20px;
            padding: 12px;
            border-radius: 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
        }

        .field-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }

        .field-edit {
            width: 100%;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .confidence-chip {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
        }

        .conf-high {
            background: #dcfce7;
            color: #166534;
        }

        .conf-low {
            background: #fee2e2;
            color: #991b1b;
        }

        .tag {
            background: var(--bg-tertiary);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        /* Specific Styles for Review Page */
        .breadth-bar {
            height: 12px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            overflow: hidden;
            display: flex;
            margin-top: 8px;
        }

        .breadth-pos {
            background: var(--success);
            height: 100%;
            transition: width 0.6s ease;
        }

        .breadth-neg {
            background: var(--danger);
            height: 100%;
            transition: width 0.6s ease;
        }

        .source-doc-preview {
            background: #fff;
            padding: 32px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: #1e293b;
            line-height: 1.6;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.05);
            min-height: 600px;

            .diff-added {
                color: var(--success);
                text-decoration: underline;
                font-weight: 600;
            }

            .diff-removed {
                color: var(--danger);
                text-decoration: line-through;
                opacity: 0.6;
            }

            @keyframes pulse {
                0% {
                    opacity: 1;
                    transform: scale(1);
                }

                50% {
                    opacity: 0.5;
                    transform: scale(1.2);
                }

                100% {
                    opacity: 1;
                    transform: scale(1);
                }
            }

            @keyframes spin {
                from {
                    transform: rotate(0deg);
                }

                to {
                    transform: rotate(360deg);
                }
            }
    </style>
</head>

        function toggleSection(type) {
            if (type === 'preview') {

                if (!isOpen) {
                    renderPreviewContent();
                    drawer.style.right = '0px';
                    overlay.style.display = 'block';
                } else {
                    drawer.style.right = '-500px';
                    overlay.style.display = 'none';
                }
            } else if (state.data.ui.sections[type] !== undefined) {
                state.data.ui.sections[type] = !state.data.ui.sections[type];
                render();
            }
        }

        function saveNewPlan() {
            const name = document.getElementById('new-plan-name').value;
            const price = document.getElementById('new-plan-price').value;
            const sectors = document.getElementById('new-plan-sectors').value;
            const companies = document.getElementById('new-plan-companies').value;

            if (!name) { alert('Plan Name is required'); return; }

            const newPlan = {
                id: 'P-' + (state.data.plans.length + 1).toString().padStart(2, '0'),
                name: name,
                slug: name.toLowerCase().replace(/ /g, '-'),
                priceMo: parseInt(price) || 0,

                sectorsLimit: parseInt(sectors) || 1,
                companiesLimit: parseInt(companies) || 10,
                features: ['basic_reports'],
                status: 'active',
                visibility: 'public'
            };

            state.data.plans.push(newPlan);
            alert('Plan "' + name + '" Created Successfully!');
            closeDrawer();
            render();
        }

                <div class="drawer-body" style="padding:24px;">
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:16px; margin-bottom:32px;">
                        <div class="stat-card"><div class="field-label">Subscribers</div><div class="stat-value" style="font-size:20px;">${channel.subscribers.toLocaleString()}</div></div>
                        <div class="stat-card"><div class="field-label">Weekly Readers</div><div class="stat-value" style="font-size:20px;">${channel.weeklyReaders.toLocaleString()}</div></div>
                    </div>
                    
                    <h4 style="font-size:12px; color:var(--text-tertiary); margin-bottom:16px;">GROWTH TRENDS</h4>
                    <div style="background:var(--bg-secondary); padding:16px; border-radius:8px; margin-bottom:32px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:12px;"><span>3-Month Growth</span><strong class="signal-long">${channel.growth3m}</strong></div>
                        <div style="display:flex; justify-content:space-between; margin-bottom:12px;"><span>YoY Growth</span><strong class="signal-long">${channel.growthYoY}</strong></div>
                        <div style="display:flex; justify-content:space-between;"><span>Market Share</span><strong>${channel.share}%</strong></div>
                    </div>

                    <h4 style="font-size:12px; color:var(--text-tertiary); margin-bottom:16px;">CHANNEL AUDIENCE QUALITY</h4>
                    <p style="font-size:13px; color:var(--text-secondary); line-height:1.6; margin-bottom:24px;">
                        ${channel.notes} Audience in this channel shows high affinity for Macro and Equity signals. Institutional conversion rate is estimated at 4.2%.
                    </p>

                    <h4 style="font-size:12px; color:var(--text-tertiary); margin-bottom:16px;">RECENT PERFORMANCE AUDIT</h4>
                    <div style="padding-left:16px; border-left:2px solid var(--border-color); position:relative;">
                        <div style="margin-bottom:24px;">
                            <div style="font-size:11px; font-weight:700;">METRIC SNAPSHOT UPDATED</div>
                            <div style="font-size:12px; color:var(--text-tertiary);">Apr 28, 2024 • Automated</div>
                        </div>
                        <div style="margin-bottom:24px;">
                            <div style="font-size:11px; font-weight:700;">STRATEGIC NOTE ADDED</div>
                            <div style="font-size:12px; color:var(--text-tertiary);">Apr 27, 2024 • Sarah L.</div>
                        </div>
                    </div>

                    <button class="btn btn-primary" style="width:100%; margin-top:24px;">Manual Metric Override</button>
                </div>
            `;
            
            overlay.style.display = 'block';
            drawer.classList.add('open');
        }

        function renderChannelDetail(container) {
            // This is a fallback if someone navigates to the URL directly
            renderReadershipDashboard(container);
        }
        function renderAddOnsManagement(container) {
            container.innerHTML = `
                <div class="page-header">
                    <div class="page-title">
                        <h1>Add-ons & Upsells</h1>
                        <p>Manage modular features and extra-capacity packs for existing subscribers.</p>
                    </div>
                    <div class="page-actions"><button class="btn btn-primary">+ Create Add-on</button></div>
                </div>
                <div class="card">
                    <div class="table-container">
                        <table>
                            <thead><tr><th>Add-on Name</th><th>Category</th><th>Price</th><th>Target Plan</th><th>Status</th></tr></thead>
                            <tbody>
                                <tr><td><strong>Strategy Insight Pack</strong></td><td>Content</td><td>$99/mo</td><td>Pro</td><td><span class="status-badge status-success">ACTIVE</span></td></tr>
                                <tr><td><strong>Extra 10 Companies</strong></td><td>Quota</td><td>$49/mo</td><td>Starter</td><td><span class="status-badge status-success">ACTIVE</span></td></tr>
                                <tr><td><strong>Bulk API Access</strong></td><td>Feature</td><td>$299/mo</td><td>Elite</td><td><span class="status-badge status-success">ACTIVE</span></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        function renderSubscriptionAudit(container) {
            container.innerHTML = `
                <div class="page-header">
                    <div class="page-title">
                        <h1>Subscription Audit Log</h1>
                        <p>Historical record of plan changes, entitlement overrides, and lifecycle events.</p>
                    </div>
                </div>
                <div class="card">
                    <div class="table-container">
                        <table>
                            <thead><tr><th>Timestamp</th><th>Action</th><th>Subscriber</th><th>Details</th><th>Operator</th></tr></thead>
                            <tbody>
                                <tr><td class="mono">2025-04-28 14:22</td><td><span class="tag">UPGRADE</span></td><td>Alexander Wright</td><td>Starter → Elite</td><td>System (Auto)</td></tr>
                                <tr><td class="mono">2025-04-28 09:15</td><td><span class="tag">OVERRIDE</span></td><td>Elena Rossi</td><td>Added 'Renewables' Sector</td><td>Sarah L.</td></tr>
                                <tr><td class="mono">2025-04-27 18:45</td><td><span class="tag">BILLING</span></td><td>Julian Thorne</td><td>Payment Failed (Attempt 2)</td><td>Stripe Proxy</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }
        function logout() {
            if (confirm('Are you sure you want to log out of the admin panel?')) {
                alert('Securely Logging Out...');
                window.location.reload();
            }
        }

        setInterval(() => {
            Object.keys(state.data.marketData).forEach(ticker => {
                const change = (Math.random() - 0.5) * 0.4;
                state.data.marketData[ticker].price += change;
                state.data.marketData[ticker].change += change;
                state.data.marketData[ticker].changePercent = (state.data.marketData[ticker].change / state.data.marketData[ticker].price) * 100;
            });
            if (state.currentScreen === 'market_feed') {
                render();
            }
        }, 5000);

        // Hash Routing
        window.addEventListener('hashchange', () => {
            const screen = window.location.hash.replace('#', '') || 'dashboard';
            navigate(screen);
        });

        // Initialize from URL
        const initialScreen = window.location.hash.replace('#', '') || 'dashboard';
        navigate(initialScreen);
    </script>
</body>
